# ============================================
# AI CROP LIFECYCLE ADVISOR - APPLICATION CONFIG
# ============================================

# ============================================
# APPLICATION
# ============================================
spring.application.name=ai-crop-advisor
app.name=AI Crop Lifecycle Advisor
app.version=1.0.0
app.environment=production
app.debug=false

# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=8080
server.servlet.context-path=/api
server.servlet.encoding.charset=UTF-8
server.error.include-message=always

# ============================================
# POSTGRESQL DATABASE CONFIGURATION
# ============================================
spring.datasource.url=${DB_url}
spring.datasource.username=${DB_Username}
spring.datasource.password=${DB_Password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# ============================================
# SCHEMA CONFIGURATION
# ============================================
spring.jpa.properties.hibernate.default_schema=AI_Analytics
spring.jpa.properties.hibernate.jdbc.default_schema=AI_Analytics

# ============================================
# JPA/HIBERNATE CONFIGURATION
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================
# SCHEMA CONFIGURATION
# ============================================
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# ============================================
# FILE UPLOAD CONFIGURATION
# ============================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload.dir=uploads/
file.upload.soil-images=uploads/soil/
file.upload.allowed-extensions=jpg,jpeg,png,gif,webp

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=${JWT_SECRET:5vOdspNJ4JUU+kvw3wwHltrScFcTQTtyTbUIrGFsiBM+0vBu/C+2xNwS3K7d/22OsV0WxwwWSU2gC+pMzcaAQA==}
jwt.expiration=604800000
jwt.header=Authorization
jwt.prefix=Bearer

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.root=INFO
logging.level.com.procure.aicrop=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/ai-crop-advisor.log
logging.file.max-size=10MB
logging.file.max-history=30

# ============================================
# GEMINI AI CONFIGURATION
# ============================================
ai.gemini.enabled=false
ai.gemini.api-key=${Gemini_Api_Key}
ai.gemini.model=gemini-2.0-flash
ai.gemini.vision-model=gemini-2.0-flash
ai.gemini.temperature=0.7
ai.gemini.top-p=0.9
ai.gemini.top-k=40
ai.gemini.max-output-tokens=2048
ai.gemini.timeout=30000

# ============================================
# GROQ AI CONFIGURATION (ACTIVE - FREE, NO BILLING NEEDED)
# ============================================
ai.groq.enabled=true
ai.groq.api-key=${Groq_Api_Key}
ai.groq.model=llama-3.3-70b-versatile
ai.groq.vision-model=meta-llama/llama-4-scout-17b-16e-instruct
ai.groq.timeout=30000

# ============================================
# OPENWEATHER API CONFIGURATION
# ============================================
weather.api.enabled=true
weather.api.provider=openweathermap
weather.api.key=${Weather_Api_Key}
weather.api.base-url=https://api.openweathermap.org/data/2.5
weather.api.forecast-days=7
weather.api.timeout=10000

# ============================================
# TENSORFLOW CONFIGURATION (DEPRECATED - Using Gemini)
# ============================================
ai.tensorflow.enabled=false
ai.tensorflow.model.path=models/soil-classification-model.pb
ai.tensorflow.confidence-threshold=0.6

# ============================================
# SOIL ANALYSIS AI CONFIGURATION
# ============================================
ai.soil.analysis.enabled=true
ai.soil.detection.model=tensorflow
ai.soil.nutrients.calculation=bayesian
ai.soil.ph.prediction.algorithm=linear-regression
ai.soil.texture.classification=cnn
ai.soil.organic-matter.estimation=gradient-boosting
ai.soil.moisture.prediction=random-forest
ai.soil.confidence.threshold=0.75
ai.soil.min-confidence-for-recommendation=0.60
ai.soil.nitrogen.prediction=polynomial-regression
ai.soil.phosphorus.prediction=neural-network
ai.soil.potassium.prediction=support-vector-machine
ai.soil.organic-matter.model=ensemble
ai.soil.nutrient.confidence.minimum=0.65

# ============================================
# CROP RECOMMENDATION AI CONFIGURATION
# ============================================
ai.crop.recommendation.enabled=true
ai.crop.suitability.algorithm=decision-tree
ai.crop.sowing-window.prediction=neural-network
ai.crop.dangerous-dates.detection=anomaly-detection
ai.crop.confidence.calculation=ensemble-method
ai.crop.recommendation.max-alternatives=5
ai.crop.similarity.threshold=0.70
ai.crop.min-suitability-score=0.65

# ============================================
# WEATHER PREDICTION AI CONFIGURATION
# ============================================
ai.weather.prediction.enabled=true
ai.weather.model=lstm-neural-network
ai.weather.forecast.days=30
ai.weather.historical.data.years=5
ai.weather.temperature.prediction.algorithm=recurrent-neural-network
ai.weather.rainfall.prediction.algorithm=arima
ai.weather.humidity.prediction.algorithm=gradient-boosting
ai.weather.wind-speed.prediction.algorithm=support-vector-machine
ai.weather.confidence.threshold=0.70

# ============================================
# YIELD PREDICTION AI CONFIGURATION
# ============================================
ai.yield.prediction.enabled=true
ai.yield.model=gradient-boosting-regressor
ai.yield.update-frequency=daily
ai.yield.recalculation.enabled=true
ai.yield.calculation.factors=temperature,rainfall,disease-risk,pest-risk,growth-stage
ai.yield.base-model=crop-specific
ai.yield.confidence.calculation=monte-carlo-simulation
ai.yield.min-prediction-confidence=0.60
ai.yield.adjustment.factor=1.05

# ============================================
# CROP DISEASE & PEST AI CONFIGURATION
# ============================================
ai.disease.detection.enabled=true
ai.disease.model=convolutional-neural-network
ai.disease.prediction.algorithm=random-forest
ai.disease.risk.calculation=bayesian-network
ai.disease.confidence.threshold=0.75
ai.pest.detection.enabled=true
ai.pest.model=deep-learning
ai.pest.risk.calculation=gradient-boosting
ai.pest.confidence.threshold=0.70

# ============================================
# ALERT GENERATION AI CONFIGURATION
# ============================================
ai.alert.generation.enabled=true
ai.alert.severity.calculation=fuzzy-logic
ai.alert.recommendation.engine=expert-system
ai.alert.risk-assessment=bayesian-inference
ai.alert.anomaly-detection=isolation-forest
ai.alert.threshold.critical=0.85
ai.alert.threshold.high=0.70
ai.alert.threshold.medium=0.50
ai.alert.threshold.low=0.30

# ============================================
# GROWTH STAGE PREDICTION AI CONFIGURATION
# ============================================
ai.growth.stage.prediction.enabled=true
ai.growth.stage.model=time-series-analysis
ai.growth.stage.algorithm=hidden-markov-model
ai.growth.stage.accuracy.threshold=0.80

# ============================================
# IMAGE PROCESSING AI CONFIGURATION
# ============================================
ai.image.processing.enabled=true
ai.image.preprocessing=true
ai.image.resize.width=224
ai.image.resize.height=224
ai.image.augmentation=true
ai.image.normalization=true
ai.image.contrast.adjustment=0.8
ai.image.brightness.adjustment=1.2
ai.image.format=RGB

# ============================================
# CLUSTERING & PATTERN RECOGNITION
# ============================================
ai.clustering.algorithm=k-means
ai.clustering.enabled=true
ai.pattern.recognition.algorithm=isolation-forest
ai.anomaly.detection.enabled=true
ai.anomaly.contamination=0.1

# ============================================
# FEATURE ENGINEERING
# ============================================
ai.feature.engineering.enabled=true
ai.feature.scaling=standardization
ai.feature.selection=mutual-information
ai.feature.extraction=principal-component-analysis
ai.feature.dimensionality-reduction=true

# ============================================
# MODEL EVALUATION & VALIDATION
# ============================================
ai.model.validation.enabled=true
ai.model.cross-validation=5-fold
ai.model.test-size=0.2
ai.model.random-state=42
ai.model.performance.threshold=0.80

# ============================================
# HYPERPARAMETER OPTIMIZATION
# ============================================
ai.hyperparameter.tuning.enabled=true
ai.hyperparameter.optimization-method=grid-search
ai.hyperparameter.cv-folds=3
ai.hyperparameter.n-jobs=4

# ============================================
# TRANSFER LEARNING CONFIGURATION
# ============================================
ai.transfer-learning.enabled=true
ai.transfer-learning.pretrained-model=imagenet
ai.transfer-learning.fine-tuning=true
ai.transfer-learning.frozen-layers=50

# ============================================
# ENSEMBLE METHODS
# ============================================
ai.ensemble.enabled=true
ai.ensemble.voting-classifier=soft
ai.ensemble.stacking.enabled=true
ai.ensemble.bagging.enabled=true
ai.ensemble.boosting.algorithm=gradient-boost

# ============================================
# REAL-TIME INFERENCE
# ============================================
ai.inference.real-time.enabled=true
ai.inference.batch-size=32
ai.inference.timeout=30000
ai.inference.cache.enabled=true
ai.inference.cache.ttl=3600

# ============================================
# MODEL DEPLOYMENT & VERSIONING
# ============================================
ai.model.versioning.enabled=true
ai.model.version=1.0.0
ai.model.auto-update=false
ai.model.fallback-enabled=true

# ============================================
# EXTERNAL AI SERVICES INTEGRATION
# ============================================
ai.external.openweather.api.enabled=false
ai.external.openweather.api.key=your_api_key_here
ai.external.openweather.api.base-url=https://api.openweathermap.org/data/2.5
ai.external.tflite.enabled=true
ai.external.tensorflow-serving.enabled=false
ai.external.tensorflow-serving.url=http://localhost:8501

# ============================================
# PERFORMANCE TUNING
# ============================================
ai.performance.threading.enabled=true
ai.performance.thread-pool-size=4
ai.performance.batch-processing=true
ai.performance.async-prediction=true
ai.performance.gpu.enabled=false
ai.performance.quantization.enabled=true

# ============================================
# MONITORING & METRICS
# ============================================
ai.monitoring.enabled=true
ai.monitoring.track-predictions=true
ai.monitoring.track-accuracy=true
ai.monitoring.track-inference-time=true
ai.monitoring.metrics.retention-days=90

# ============================================
# DATA AUGMENTATION
# ============================================
ai.data-augmentation.enabled=true
ai.data-augmentation.rotation=15
ai.data-augmentation.horizontal-flip=true
ai.data-augmentation.vertical-flip=false
ai.data-augmentation.zoom=0.2
ai.data-augmentation.shear=0.2

# ============================================
# REGULARIZATION
# ============================================
ai.regularization.l1=0.0001
ai.regularization.l2=0.0001
ai.regularization.dropout=0.5
ai.regularization.early-stopping=true
ai.regularization.patience=10

# ============================================
# LEARNING RATE CONFIGURATION
# ============================================
ai.learning-rate.initial=0.001
ai.learning-rate.decay=0.95
ai.learning-rate.scheduler=exponential
ai.learning-rate.warmup-steps=1000

# ============================================
# BATCH PROCESSING
# ============================================
ai.batch.size=32
ai.batch.prefetch-size=10
ai.batch.shuffle-buffer=1000
ai.batch.num-parallel-calls=4

# ============================================
# ADVANCED FEATURES
# ============================================
ai.explainability.enabled=true
ai.explainability.method=lime
ai.fairness.check.enabled=true
ai.robustness.test.enabled=true
ai.uncertainty.quantification=true

# ============================================
# CORS CONFIGURATION
# ============================================
cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://localhost:5173
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=*
cors.exposed-headers=Authorization,Content-Type
cors.allow-credentials=true
cors.max-age=3600

# ============================================
# ACTUATOR & MONITORING
# ============================================
management.endpoints.web.exposure.include=health,metrics,info,prometheus
management.endpoint.health.show-details=always
management.metrics.enable.jvm=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ============================================
# CACHING CONFIGURATION
# ============================================
spring.cache.type=simple
spring.cache.cache-names=crops,users,recommendations
